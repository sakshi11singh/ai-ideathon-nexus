<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>

    <!-- Glow/Neon Gradient -->
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
        <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)" />
  <!-- Grid -->
  <rect width="1200" height="800" fill="url(#grid)" />

  <!-- Abstract Tech/AI Waves -->
  <path d="M 0 400 Q 300 250 600 400 T 1200 400" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.4" />
  <path d="M 0 450 Q 300 600 600 450 T 1200 450" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.3" />
  <path d="M 0 350 Q 300 200 600 350 T 1200 350" fill="none" stroke="#3b82f6" stroke-width="3" opacity="0.2" filter="url(#neon)"/>

  <!-- AI Elements (Nodes) -->
  <circle cx="200" cy="325" r="4" fill="#8b5cf6" filter="url(#neon)"/>
  <circle cx="450" cy="460" r="5" fill="#3b82f6" filter="url(#neon)"/>
  <circle cx="850" cy="335" r="4" fill="#d946ef" filter="url(#neon)"/>
  <circle cx="1000" cy="480" r="6" fill="#8b5cf6" filter="url(#neon)"/>

  <!-- Central Icon Frame -->
  <g transform="translate(500, 300)">
    <!-- Tech Frame Box -->
    <rect x="-30" y="-30" width="260" height="180" rx="20" fill="#0f172a" fill-opacity="0.8" stroke="url(#glow)" stroke-width="3" filter="url(#neon)" />
    
    <!-- Image Icon Elements -->
    <circle cx="40" cy="20" r="20" fill="rgba(139, 92, 246, 0.4)" stroke="url(#glow)" stroke-width="2"/>
    <path d="M -30 110 L 40 40 L 120 120 L 160 80 L 230 150" fill="none" stroke="url(#glow)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Text Section -->
  <text x="600" y="580" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="36" fill="#f8fafc" text-anchor="middle" font-weight="700" letter-spacing="4" filter="url(#neon)">
    IMAGE PLACEHOLDER
  </text>
  <text x="600" y="620" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" text-anchor="middle" font-weight="400" letter-spacing="2">
    AI IDEATHON 2026 // 1200x800
  </text>
</svg>
